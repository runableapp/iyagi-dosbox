# dosbox.conf — IYAGI 5.3 portable package
# Tuned for a 1992 Borland C++ DOS terminal program.
# The launcher script mounts:
#   C: → <package>/app/        (IYAGI program files)
#   D: → <user-data>/downloads/ (received files)

[sdl]
fullscreen=false
fullresolution=original
# 2x window size target for VGA-class content.
# (640x480 guest mode -> 1280x960 host window)
windowresolution=1280x960
output=texture
texture_renderer=auto
# High-refresh panels can make software cursors feel "too fast"; cap host cadence.
vsync = adaptive
host_rate = 60
window_decorations=true
waitonerror=true
mapperfile=

[dosbox]
language=
machine=svga_s3
# 16 MB is more than enough for IYAGI 5.3
memsize=16

[render]
aspect=false
frameskip=1

[mouse]
mouse_capture=nomouse
mouse_middle_release=false
dos_mouse_driver=false

[cpu]
core=simple
cputype=386
# IYAGI was designed for a ~10 MHz 286/386.
# Too many cycles causes modem AT-command timing glitches and
# can make software cursor blink unnaturally fast in terminal UIs.
cycles=fixed 2000
cycleup=10
cycledown=20

[mixer]
nosound=false
rate=22050
blocksize=2048
prebuffer=10

[midi]
mpu401=intelligent
mididevice=none
midiconfig=

[sblaster]
sbtype=sb16
sbbase=220
irq=7
dma=1
hdma=5
sbmixer=true
oplmode=auto

[gus]
gus=false

[speaker]
pcspeaker=discrete
tandy=off

[joystick]
joysticktype=none

[serial]
# COM4 → bridge link (AT commands are forwarded to bridge parser).
# IYAGI can keep using its common COM4 default while bridge handles ATDT.
serial1=disabled
serial2=dummy
serial3=disabled
serial4=nullmodem server:127.0.0.1 port:2323 transparent:1

[dos]
xms=true
ems=true
umb=true
keyboardlayout=auto

[ipx]
ipx=false

[ethernet]
ne2000=false

[autoexec]
# Paths are relative to the directory containing this dosbox.conf.
# The launcher must cd to the package root before calling dosbox.
mount c ./app
mount d ./downloads
c:
I.EXE
exit
